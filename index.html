<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#e07050">
<link rel="manifest" href="manifest.json">
<title>Meal Planner</title>
<style>
  :root {
    --bg: #f8f5f2;
    --card: #ffffff;
    --text: #1c1c1e;
    --muted: #8e8e93;
    --border: #e8e4e0;
    --primary: #e07050;
    --primary-light: #fceae4;
    --green: #34c759;
    --red: #ff3b30;
    --shadow: 0 1px 4px rgba(0,0,0,0.06);
    --radius: 14px;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    max-width: 640px;
    margin: 0 auto;
    padding: 0 16px 100px;
    min-height: 100vh;
  }
  .header {
    padding: 52px 0 12px;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header h1 span { color: var(--primary); }
  .header .subtitle { font-size: 14px; color: var(--muted); margin-top: 2px; }

  .section {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-size: 17px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .count { font-size: 13px; font-weight: 500; color: var(--muted); }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .input-row input {
    flex: 1;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    background: var(--bg);
    transition: border-color 0.2s;
  }
  .input-row input:focus { outline: none; border-color: var(--primary); background: var(--card); }
  .input-row input::placeholder { color: #c7c7cc; }

  .btn {
    padding: 11px 18px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    background: var(--primary);
    color: #fff;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.7; }
  .btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 8px; font-weight: 500; }
  .btn-tiny {
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 6px;
    font-weight: 500;
  }

  .item-list { list-style: none; }
  .item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.2s ease;
  }
  .item:last-child { border-bottom: none; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(20px); } }
  .item.removing { animation: fadeOut 0.2s ease forwards; }

  .item .emoji { font-size: 18px; flex-shrink: 0; cursor: pointer; }
  .item label {
    flex: 1;
    font-size: 15px;
    cursor: pointer;
    word-break: break-word;
  }
  .item .del {
    background: none;
    border: none;
    color: #c7c7cc;
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    transition: color 0.2s;
  }
  .item .del:active { color: var(--red); }
  .check {
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .check.checked { background: var(--green); border-color: var(--green); }
  .check.checked::after { content: '✓'; color: #fff; font-size: 13px; font-weight: 700; }
  .item.checked label { text-decoration: line-through; color: var(--muted); }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 24px 0 8px;
    line-height: 1.5;
  }
  .empty .hint { font-size: 28px; display: block; margin-bottom: 6px; }

  .plan-wrap { overflow-x: auto; }
  .plan-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 420px;
  }
  .plan-table th {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    padding: 6px 4px 10px;
    text-align: left;
    white-space: nowrap;
  }
  .plan-table th:first-child { width: 52px; }
  .plan-table td {
    padding: 4px 4px 8px;
    vertical-align: top;
  }
  .plan-table td:first-child {
    font-size: 13px;
    font-weight: 600;
    padding-top: 8px;
    white-space: nowrap;
    color: var(--text);
  }
  .plan-table tr.today td:first-child { color: var(--primary); }

  .meal-cell { position: relative; }
  .meal-input {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    transition: border-color 0.2s, background 0.2s;
    min-width: 80px;
    cursor: text;
  }
  .meal-input:focus { outline: none; border-color: var(--primary); background: var(--card); }
  .meal-input::placeholder { color: #d1d1d6; font-size: 12px; }

  .ing-panel {
    background: var(--bg);
    border-radius: 8px;
    padding: 10px;
    margin-top: 6px;
    display: none;
  }
  .ing-panel.open { display: block; }
  .ing-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .ing-row:last-of-type { border-bottom: none; }
  .ing-row .del-ing {
    background: none;
    border: none;
    color: #c7c7cc;
    font-size: 14px;
    cursor: pointer;
    padding: 2px;
  }
  .ing-row .del-ing:active { color: var(--red); }
  .ing-add-row { display: flex; gap: 6px; margin-top: 6px; }
  .ing-add-row input {
    flex: 1;
    padding: 6px 10px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    background: var(--card);
  }
  .ing-add-row input:focus { outline: none; border-color: var(--primary); }

  .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .btn-ghost {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-ghost:active { background: var(--border); }

  .install-banner {
    display: none;
    background: var(--primary);
    color: #fff;
    padding: 14px 16px;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.12);
  }

  @media (max-width: 420px) {
    .meal-input { padding: 7px 8px; font-size: 13px; }
    .plan-table td:first-child { font-size: 12px; }
    .plan-table th { font-size: 11px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🍽 <span>Meal</span> Planner</h1>
  <div class="subtitle" id="range-label"></div>
</div>

<div class="section">
  <div class="section-header">
    <div class="section-title">🧊 In The Fridge</div>
    <span class="count" id="fridge-count"></span>
  </div>
  <div class="input-row">
    <input id="fridge-input" placeholder="e.g., milk, eggs, chicken..." autocomplete="off">
    <button class="btn" id="fridge-add">Add</button>
  </div>
  <ul class="item-list" id="fridge-list"></ul>
</div>

<div class="section">
  <div class="section-header">
    <div class="section-title">📅 Weekly Plan</div>
  </div>
  <div class="plan-wrap">
    <table class="plan-table">
      <thead>
        <tr><th></th><th>🌅 Breakfast</th><th>☀️ Lunch</th><th>🍿 Snacks</th><th>🌙 Dinner</th></tr>
      </thead>
      <tbody id="plan-body"></tbody>
    </table>
  </div>
</div>

<div class="section">
  <div class="section-header">
    <div class="section-title">🛒 Grocery List</div>
    <span class="count" id="grocery-count"></span>
  </div>
  <div class="input-row">
    <input id="grocery-input" placeholder="Add item to buy..." autocomplete="off">
    <button class="btn" id="grocery-add">Add</button>
  </div>
  <ul class="item-list" id="grocery-list"></ul>
  <div class="actions">
    <button class="btn-ghost" id="clear-checked">Clear checked</button>
  </div>
</div>

<div class="install-banner" id="install-banner">
  📲 Install <strong>Meal Planner</strong> for offline use
</div>

<script>
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MEALS = ['breakfast','lunch','snacks','dinner'];
  const KEY = 'mealplanner-v4';

  let state = load();
  let expanded = null;

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function getDates() {
    const dates = [];
    const today = new Date();
    for (let i = 0; i < 8; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      dates.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'));
    }
    return dates;
  }

  function fmtShort(d) {
    const date = new Date(d + 'T12:00:00');
    return DAYS[date.getDay()] + ' ' + date.getDate();
  }

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) {
        const p = JSON.parse(raw);
        if (p && typeof p === 'object') return p;
      }
    } catch (e) {}
    return { meals: {}, fridge: [], grocery: [] };
  }

  function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function randomEmoji() {
    const e = ['🥩','🥦','🧀','🥕','🍅','🥬','🍗','🥚','🧈','🥛','🍞','🍎','🍌','🥝','🍊','🧅','🥔','🌽','🍄','🥜','🧂','🫐','🍓','🥒','🧁','🥐','🧇','🥓','🍳','🌯'];
    return e[Math.floor(Math.random() * e.length)];
  }

  function addFridge() {
    const input = document.getElementById('fridge-input');
    const text = input.value.trim();
    if (!text) return;
    state.fridge.push({ text, emoji: randomEmoji() });
    save();
    input.value = '';
    renderFridge();
    input.focus();
  }

  function removeFridge(i) {
    const items = document.querySelectorAll('#fridge-list .item');
    if (items[i]) items[i].classList.add('removing');
    setTimeout(() => {
      state.fridge.splice(i, 1);
      save();
      renderFridge();
    }, 200);
  }

  function renderFridge() {
    const list = document.getElementById('fridge-list');
    const items = state.fridge || [];
    document.getElementById('fridge-count').textContent = items.length ? items.length + ' items' : '';
    if (!items.length) {
      list.innerHTML = '<li class="empty"><span class="hint">🧊</span>What\'s in your fridge?</li>';
      return;
    }
    list.innerHTML = '';
    items.forEach((item, i) => {
      const li = document.createElement('li');
      li.className = 'item';
      li.innerHTML = '<span class="emoji" onclick="removeFridge(' + i + ')">' + (item.emoji || '🥘') + '</span><label onclick="removeFridge(' + i + ')">' + esc(item.text) + '</label><button class="del" onclick="removeFridge(' + i + ')">✕</button>';
      list.appendChild(li);
    });
  }

  function addGrocery() {
    const input = document.getElementById('grocery-input');
    const text = input.value.trim();
    if (!text) return;
    state.grocery.push({ text, checked: false });
    save();
    input.value = '';
    renderGrocery();
    input.focus();
  }

  function toggleGrocery(i) {
    if (!state.grocery[i]) return;
    state.grocery[i].checked = !state.grocery[i].checked;
    save();
    renderGrocery();
  }

  function deleteGrocery(i) {
    state.grocery.splice(i, 1);
    save();
    renderGrocery();
  }

  function renderGrocery() {
    const list = document.getElementById('grocery-list');
    const items = state.grocery || [];
    document.getElementById('grocery-count').textContent = items.length ? items.length + ' items' : '';
    if (!items.length) {
      list.innerHTML = '<li class="empty"><span class="hint">🛒</span>Nothing to buy yet</li>';
      return;
    }
    list.innerHTML = '';
    items.forEach((item, i) => {
      const li = document.createElement('li');
      li.className = 'item' + (item.checked ? ' checked' : '');
      li.innerHTML = '<div class="check' + (item.checked ? ' checked' : '') + '" onclick="toggleGrocery(' + i + ')"></div><label onclick="toggleGrocery(' + i + ')">' + esc(item.text) + '</label><button class="del" onclick="deleteGrocery(' + i + ')">✕</button>';
      list.appendChild(li);
    });
  }

  function getVal(date, meal) {
    const m = state.meals[date] && state.meals[date][meal];
    return (m && m.value) || '';
  }
  function getIngs(date, meal) {
    const m = state.meals[date] && state.meals[date][meal];
    return (m && m.ingredients) || [];
  }
  function setVal(date, meal, val) {
    if (!state.meals[date]) state.meals[date] = {};
    if (!state.meals[date][meal]) state.meals[date][meal] = { value: '', ingredients: [] };
    state.meals[date][meal].value = val;
    save();
  }

  function onMealClick(date, meal) {
    const key = date + '-' + meal;
    if (expanded === key) return;
    if (expanded) {
      const prev = document.getElementById('ing-panel-' + expanded);
      if (prev) prev.classList.remove('open');
    }
    expanded = key;
    const panel = document.getElementById('ing-panel-' + key);
    if (!panel) return;
    panel.classList.add('open');
    refreshIngs(date, meal);
    const inp = document.getElementById('ing-input-' + key);
    if (inp) setTimeout(() => inp.focus(), 50);
  }

  function collapseIngs() {
    if (expanded) {
      const prev = document.getElementById('ing-panel-' + expanded);
      if (prev) prev.classList.remove('open');
      expanded = null;
    }
  }

  function addIng(date, meal) {
    const key = date + '-' + meal;
    const input = document.getElementById('ing-input-' + key);
    if (!input) return;
    const text = input.value.trim();
    if (!text) return;
    if (!state.meals[date]) state.meals[date] = {};
    if (!state.meals[date][meal]) state.meals[date][meal] = { value: '', ingredients: [] };
    state.meals[date][meal].ingredients.push({ text, emoji: randomEmoji() });
    save();
    input.value = '';
    refreshIngs(date, meal);
    input.focus();
  }

  function removeIng(date, meal, idx) {
    const m = state.meals[date] && state.meals[date][meal];
    if (!m) return;
    m.ingredients.splice(idx, 1);
    save();
    refreshIngs(date, meal);
  }

  function refreshIngs(date, meal) {
    const key = date + '-' + meal;
    const panel = document.getElementById('ing-panel-' + key);
    if (!panel) return;
    const ings = getIngs(date, meal);
    let html = '';
    ings.forEach((ing, i) => {
      html += '<div class="ing-row"><span>' + (ing.emoji || '🥘') + ' ' + esc(ing.text) + '</span><button class="del-ing" onclick="removeIng(\'' + date + '\',\'' + meal + '\',' + i + ')">✕</button></div>';
    });
    html += '<div class="ing-add-row"><input id="ing-input-' + key + '" placeholder="Add ingredient..." autocomplete="off"><button class="btn btn-tiny" onclick="addIng(\'' + date + '\',\'' + meal + '\')">+</button></div>';
    panel.innerHTML = html;
    const inp = document.getElementById('ing-input-' + key);
    if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') addIng(date, meal); });
  }

  function renderPlan() {
    const dates = getDates();
    const today = todayStr();
    document.getElementById('range-label').textContent = fmtShort(dates[0]) + ' — ' + fmtShort(dates[7]);

    const tbody = document.getElementById('plan-body');
    tbody.innerHTML = '';
    dates.forEach(date => {
      const tr = document.createElement('tr');
      tr.className = date === today ? 'today' : '';
      let cells = '<td>' + fmtShort(date) + '</td>';
      MEALS.forEach(meal => {
        const key = date + '-' + meal;
        const val = getVal(date, meal);
        const isExpanded = expanded === key;
        cells += '<td class="meal-cell"><input class="meal-input" value="' + esc(val) + '" placeholder="..." onclick="onMealClick(\'' + date + '\',\'' + meal + '\')" oninput="setVal(\'' + date + '\',\'' + meal + '\',this.value)"><div class="ing-panel' + (isExpanded ? ' open' : '') + '" id="ing-panel-' + key + '"></div></td>';
      });
      tr.innerHTML = cells;
      tbody.appendChild(tr);
    });
    if (expanded) {
      refreshIngs(expanded.split('-')[0], expanded.split('-')[1]);
    }
  }

  document.getElementById('fridge-add').addEventListener('click', addFridge);
  document.getElementById('fridge-input').addEventListener('keydown', e => { if (e.key === 'Enter') addFridge(); });
  document.getElementById('grocery-add').addEventListener('click', addGrocery);
  document.getElementById('grocery-input').addEventListener('keydown', e => { if (e.key === 'Enter') addGrocery(); });
  document.getElementById('clear-checked').addEventListener('click', () => {
    state.grocery = state.grocery.filter(i => !i.checked);
    save();
    renderGrocery();
  });

  renderPlan();
  renderFridge();
  renderGrocery();

  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('install-banner').style.display = 'block';
  });
  document.getElementById('install-banner').addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const r = await deferredPrompt.userChoice;
      if (r.outcome === 'accepted') document.getElementById('install-banner').style.display = 'none';
      deferredPrompt = null;
    }
  });
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
